<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ดูดวงออนไลน์</title>
  <style>
    :root {
      --bg1: #1b1038;
      --bg2: #3c1d5f;
      --accent: #ffd166;
      --text: #fff8e8;
      --muted: #f4d9ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      color: var(--text);
      padding: 24px;
    }

    .card {
      width: min(100%, 560px);
      background: rgba(255, 255, 255, 0.08);
      -webkit-backdrop-filter: blur(14px);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.28);
      padding: 36px 28px;
      text-align: center;
    }

    .badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255, 209, 102, 0.16);
      color: var(--accent);
      font-size: 0.9rem;
      margin-bottom: 16px;
      letter-spacing: 0.04em;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 2.8rem);
      margin: 0 0 12px;
      font-weight: 700;
    }

    p {
      font-size: 1rem;
      line-height: 1.7;
      color: var(--muted);
      margin: 0 0 24px;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .links a {
      display: block;
      padding: 14px 16px;
      border-radius: 14px;
      text-decoration: none;
      color: #fff;
      background: linear-gradient(90deg, #7c4dff, #a66cff);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 10px 24px rgba(124, 77, 255, 0.25);
      font-weight: 600;
    }

    .links a:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 28px rgba(124, 77, 255, 0.3);
    }

    .footer {
      margin-top: 20px;
      font-size: 0.95rem;
      color: rgba(255, 248, 232, 0.8);
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">บริการดูดวงออนไลน์</div>
    <h1>ดูดวงออนไลน์</h1>
    <h1>อาจาย์ครูบอก</h1>
    <p>ยินดีต้อนรับสู่หน้าเว็บไซต์สำหรับติดต่อและรับคำปรึกษาในเรื่องดูดวงออนไลน์</p>

    <div class="links">
      <a href="https://www.facebook.com/share/1cEpRjS8Sh/?mibextid=wwXIfr" target="_blank" rel="noopener noreferrer">Facebook</a>
      <a href="https://www.instagram.com/rachatyotsa_mut?igsh=MW9mcjIydThzMGRuZQ%3D%3D&utm_source=qr" target="_blank" rel="noopener noreferrer">Instagram</a>
      <a href="https://line.me/ti/p/RXm_kWjv6P" target="_blank" rel="noopener noreferrer">Line</a>
    </div>

    <div class="footer">ติดต่อได้ที่ช่องทางด้านบน</div>
  </main>
</body>
</html>
